<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Skill Framework — organize, validate, and deploy AI agent skills at scale">
  <style>
    .tick { animation: sfPulse 3.2s ease-in-out infinite; }
    .flow { animation: sfFlow 1.8s linear infinite; }
    @keyframes sfPulse { 0%, 100% { opacity: .55 } 50% { opacity: 1 } }
    @keyframes sfFlow { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -20 } }
    @media (prefers-reduced-motion: reduce) {
      .tick, .flow { animation: none; opacity: 1 }
    }
  </style>
  <defs>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.1" fill="#eef1f4"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="#ffffff"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- logo mark: the four axes -->
  <g>
    <rect x="70" y="91"  width="16" height="16" rx="4" fill="#0b8a68"/>
    <rect x="90" y="91"  width="16" height="16" rx="4" fill="#0b8a68" opacity=".55"/>
    <rect x="70" y="111" width="16" height="16" rx="4" fill="#0b8a68" opacity=".3"/>
    <rect x="90" y="111" width="16" height="16" rx="4" fill="#0b8a68" opacity=".75"/>
  </g>

  <!-- wordmark -->
  <text x="122" y="128" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="52" font-weight="600" letter-spacing="-1" fill="#1f2328">Skill Framework</text>

  <!-- tagline -->
  <text x="70" y="178" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="23" fill="#59636e">Organize, validate, and deploy AI agent skills at scale.</text>

  <!-- fine print -->
  <text x="70" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="15" fill="#6e7781">17 lint rules&#160;&#160;·&#160;&#160;4 built-in targets&#160;&#160;·&#160;&#160;1 runtime dependency&#160;&#160;·&#160;&#160;no LLM calls</text>

  <!-- taxonomy tree resolving into a deployed skill -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16.5" fill="#59636e">
    <text x="652" y="42" font-size="14" fill="#6e7781">skills/</text>
    <path d="M660 50 V 60 H 672" fill="none" stroke="#d1d9e0" stroke-width="1.3"/>
    <text x="680" y="66">domain/</text>
    <path d="M688 76 V 98 H 712" fill="none" stroke="#d1d9e0" stroke-width="1.3"/>
    <text x="720" y="104">transportation/</text>
    <path d="M728 114 V 136 H 752" fill="none" stroke="#d1d9e0" stroke-width="1.3"/>
    <text x="760" y="142">aviation/</text>
    <path d="M768 152 V 174 H 792" fill="none" stroke="#d1d9e0" stroke-width="1.3"/>
    <text x="800" y="180">rotary-wing/</text>
    <path d="M808 190 V 216 H 828" fill="none" stroke="#d1d9e0" stroke-width="1.3"/>
  </g>

  <!-- the deployed skill -->
  <rect x="836" y="196" width="236" height="40" rx="9" fill="#0b8a68" fill-opacity=".06" stroke="#0b8a68" stroke-width="1.4"/>
  <text class="tick" x="854" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="18" fill="#0b8a68">&#10003;</text>
  <text x="880" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="17.5" fill="#1f2328">b-212/SKILL.md</text>

  <!-- deploy flow line out of frame -->
  <path class="flow" d="M1072 216 H 1200" fill="none" stroke="#0b8a68" stroke-opacity=".5"
        stroke-width="1.4" stroke-dasharray="3 7"/>

  <!-- axis pills -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13.5" fill="#59636e">
    <rect x="836" y="252" width="152" height="30" rx="15" fill="none" stroke="#d1d9e0" stroke-width="1.2"/>
    <text x="912" y="271" text-anchor="middle">memory: motor</text>
    <rect x="1000" y="252" width="192" height="30" rx="15" fill="none" stroke="#d1d9e0" stroke-width="1.2"/>
    <text x="1096" y="271" text-anchor="middle">duration: permanent</text>
  </g>
</svg>
