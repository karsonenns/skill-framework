name: Bug report
description: Something in sf misbehaves
labels: [bug]
body:
  - type: input
    id: env
    attributes:
      label: skillfw version, OS, Node version
      placeholder: 0.2.0 / macOS 15 / Node 22
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce, expected vs actual, and full output
      description: Ideally a minimal SKILL.md + skillfw.yaml and the exact command.
    validations: { required: true }
