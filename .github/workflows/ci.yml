name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test # builds first; includes archetype lint + init/deploy e2e via the binary
      - name: scaffold and lint round trip
        shell: bash
        run: |
          dir="$(mktemp -d)"
          node packages/cli/bin/sf.js init "$dir"
          node packages/cli/bin/sf.js lint "$dir"
      - name: pack tarball sanity check
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: cd packages/cli && npm pack --dry-run

  # Aggregate gate for branch protection. Protecting this single job instead of
  # the four matrix legs keeps the required-check name stable when the matrix
  # changes, and `always()` ensures it reports a failure (never "skipped",
  # which branch protection would treat as passing) when any leg fails.
  ci-ok:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: all matrix legs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi
