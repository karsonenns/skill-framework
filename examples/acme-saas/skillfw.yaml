# Skill Framework manifest — see docs/convention.md
version: 1
name: acme-ops
skills_dir: skills

targets:
  claude-code:
    path: .claude/skills
  codex:
    path: .codex/skills
  gemini-cli:
    path: .gemini/skills
  cursor:
    path: .cursor/skills

# Skills declare the secrets they need in frontmatter (`secrets: [STRIPE_KEY]`).
# This maps each key to a provider. Values are never written into compiled
# skills — deploy only verifies each secret resolves.
secrets:
  STRIPE_KEY: env://STRIPE_KEY

budgets:
  skill_tokens: 2000   # max tokens per SKILL.md body (chars/4 estimate)
  tree_tokens: 60000   # max total across all frontmatter descriptions
